<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients for 3D effect -->
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1D3A"/>
      <stop offset="100%" style="stop-color:#1a2d5a"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="differentialBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="50%" style="stop-color:#1F2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#2563EB" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer circle with double border -->
  <circle cx="200" cy="200" r="195" fill="#FFFFFF" stroke="#0F1D3A" stroke-width="8" filter="url(#shadow1)"/>
  
  <!-- Inner decorative ring -->
  <circle cx="200" cy="200" r="184" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.4"/>

  <!-- Small decorative dots at compass points -->
  <circle cx="200" cy="16" r="3" fill="#2563EB"/>
  <circle cx="200" cy="384" r="3" fill="#2563EB"/>
  <circle cx="16" cy="200" r="3" fill="#2563EB"/>
  <circle cx="384" cy="200" r="3" fill="#2563EB"/>

  <!-- ===== "LARA & SONS" arched text ===== -->
  <!-- Outer arch -->
  <path id="topArc" d="M 55,165 A 145,145 0 0,1 345,165" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="900" fill="#0F1D3A" letter-spacing="5" filter="url(#shadow1)">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">LARA &amp; SONS</textPath>
  </text>

  <!-- ===== "DIFFERENTIALS 4x4's" subtitle ===== -->
  <text x="200" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#4B5563" text-anchor="middle" letter-spacing="2.5">
    DIFFERENTIALS 4x4's
  </text>

  <!-- ===== Decorative separator line ===== -->
  <line x1="90" y1="230" x2="310" y2="230" stroke="url(#goldAccent)" stroke-width="2" opacity="0.7"/>
  <circle cx="200" cy="230" r="3" fill="#2563EB"/>

  <!-- ===== REALISTIC TRUCK DIFFERENTIAL GRAPHIC ===== -->
  <g transform="translate(200, 272)" filter="url(#shadow1)">
    
    <!-- Axle tube left -->
    <rect x="-52" y="-6" width="24" height="12" rx="4" fill="#4B5563"/>
    <rect x="-52" y="-6" width="24" height="12" rx="4" fill="none" stroke="#1F2937" stroke-width="1"/>
    <rect x="-44" y="-9" width="8" height="18" rx="2" fill="#6B7280" opacity="0.5"/>
    
    <!-- Axle tube right -->
    <rect x="28" y="-6" width="24" height="12" rx="4" fill="#4B5563"/>
    <rect x="28" y="-6" width="24" height="12" rx="4" fill="none" stroke="#1F2937" stroke-width="1"/>
    <rect x="36" y="-9" width="8" height="18" rx="2" fill="#6B7280" opacity="0.5"/>
    
    <!-- Differential pumpkin housing (main body) - 3D effect with multiple layers -->
    <!-- Shadow/back layer -->
    <path d="M -30,10 C -30,-24 -18,-30 0,-30 C 18,-30 30,-24 30,10 C 30,24 26,30 18,33 C 10,36 0,36 -18,33 C -26,30 -30,24 -30,10 Z" 
          fill="#111827" transform="translate(2,2)"/>
    <!-- Main body -->
    <path d="M -30,10 C -30,-24 -18,-30 0,-30 C 18,-30 30,-24 30,10 C 30,24 26,30 18,33 C 10,36 0,36 -18,33 C -26,30 -30,24 -30,10 Z" 
          fill="url(#differentialBody)" stroke="#0F1D3A" stroke-width="2.5"/>
    
    <!-- Highlight/shine on housing -->
    <path d="M -22,-15 C -16,-24 -8,-27 0,-27 C 8,-27 16,-24 22,-15" 
          fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>

    <!-- Differential cover line (bottom half of pumpkin) -->
    <path d="M -28,6 C -28,-10 -16,-16 0,-16 C 16,-16 28,-10 28,6" 
          fill="none" stroke="#4B5563" stroke-width="2"/>
    
    <!-- Ring gear hint (visible through cutaway) -->
    <path d="M -18,2 C -14,-8 -8,-12 0,-12 C 8,-12 14,-8 18,2" 
          fill="none" stroke="#9CA3AF" stroke-width="3" stroke-dasharray="3,3"/>
    <path d="M -14,8 C -10,-2 -4,-6 0,-6 C 4,-6 10,-2 14,8" 
          fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="2,3"/>

    <!-- Cover bolts - 8 total -->
    <circle cx="-20" cy="8" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>
    <circle cx="-20" cy="-8" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>
    <circle cx="-12" cy="18" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>
    <circle cx="-12" cy="-18" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>
    <circle cx="20" cy="8" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>
    <circle cx="20" cy="-8" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>
    <circle cx="12" cy="18" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>
    <circle cx="0" cy="20" r="2.5" fill="#9CA3AF" stroke="#4B5563" stroke-width="0.5"/>

    <!-- Pinion flange / yoke -->
    <path d="M -8,32 L -10,40 L 10,40 L 8,32" fill="#4B5563" stroke="#0F1D3A" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="0" cy="36" r="3" fill="#6B7280"/>
    
    <!-- U-joint caps -->
    <circle cx="-10" cy="42" r="3" fill="none" stroke="#0F1D3A" stroke-width="2"/>
    <circle cx="10" cy="42" r="3" fill="none" stroke="#0F1D3A" stroke-width="2"/>
    <line x1="-10" y1="42" x2="10" y2="42" stroke="#0F1D3A" stroke-width="2" stroke-linecap="round"/>

    <!-- Driveshaft -->
    <line x1="0" y1="45" x2="0" y2="52" stroke="#4B5563" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="45" x2="0" y2="52" stroke="#0F1D3A" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Axle tube end caps -->
    <line x1="-28" y1="-12" x2="-28" y2="6" stroke="#0F1D3A" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="-12" x2="28" y2="6" stroke="#0F1D3A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ===== "Satisfaction GUARANTEED" badge ===== -->
  <rect x="105" y="337" width="190" height="24" rx="12" fill="url(#goldAccent)" filter="url(#shadow1)"/>
  <text x="200" y="353" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">
    SATISFACTION GUARANTEED
  </text>

  <!-- ===== Phone number ===== -->
  <text x="200" y="378" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0F1D3A" text-anchor="middle" letter-spacing="1.5" filter="url(#shadow1)">
    951-934-3250
  </text>
</svg>