<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1D3A"/>
      <stop offset="100%" style="stop-color:#1a2d5a"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Outer circle border -->
  <circle cx="200" cy="200" r="190" fill="white" stroke="#0F1D3A" stroke-width="6"/>
  
  <!-- Inner decorative ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="#0F1D3A" stroke-width="1" opacity="0.3"/>

  <!-- "LARA & SONS" arched text -->
  <path id="topArc" d="M 60,170 A 140,140 0 0,1 340,170" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#0F1D3A" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">LARA &amp; SONS</textPath>
  </text>

  <!-- Decorative lines on sides of title -->
  <line x1="70" y1="186" x2="130" y2="186" stroke="#0F1D3A" stroke-width="1" opacity="0.4"/>
  <line x1="270" y1="186" x2="330" y2="186" stroke="#0F1D3A" stroke-width="1" opacity="0.4"/>

  <!-- "DIFFERENTIALS 4x4's" subtitle -->
  <text x="200" y="212" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle" letter-spacing="2">
    DIFFERENTIALS 4x4's
  </text>

  <!-- Horizontal separator -->
  <line x1="100" y1="224" x2="300" y2="224" stroke="#2563EB" stroke-width="2" opacity="0.6"/>

  <!-- Custom Differential Graphic (simplified truck axle pumpkin) -->
  <g transform="translate(200, 260)">
    <!-- Axle tube left -->
    <rect x="-48" y="-5" width="22" height="10" rx="3" fill="#0F1D3A"/>
    <!-- Axle tube right -->
    <rect x="26" y="-5" width="22" height="10" rx="3" fill="#0F1D3A"/>
    <!-- Pumpkin housing -->
    <path d="M -26,8 C -26,-20 -15,-26 0,-26 C 15,-26 26,-20 26,8 C 26,22 22,28 15,30 C 8,32 0,32 -15,30 C -22,28 -26,22 -26,8 Z" fill="none" stroke="#0F1D3A" stroke-width="3"/>
    <!-- Cover bolts -->
    <circle cx="-17" cy="6" r="2" fill="#2563EB"/>
    <circle cx="-17" cy="-7" r="2" fill="#2563EB"/>
    <circle cx="-10" cy="15" r="2" fill="#2563EB"/>
    <circle cx="17" cy="6" r="2" fill="#2563EB"/>
    <circle cx="17" cy="-7" r="2" fill="#2563EB"/>
    <circle cx="10" cy="15" r="2" fill="#2563EB"/>
    <circle cx="0" cy="17" r="2" fill="#2563EB"/>
    <!-- Pinion yoke -->
    <path d="M -7,30 L -9,37 L 9,37 L 7,30" fill="none" stroke="#0F1D3A" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- U-joint -->
    <circle cx="-9" cy="39" r="3" fill="none" stroke="#0F1D3A" stroke-width="1.5"/>
    <circle cx="9" cy="39" r="3" fill="none" stroke="#0F1D3A" stroke-width="1.5"/>
    <!-- Driveshaft line -->
    <line x1="0" y1="42" x2="0" y2="48" stroke="#0F1D3A" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- "Satisfaction GUARANTEED" badge -->
  <rect x="110" y="320" width="180" height="22" rx="11" fill="url(#badgeGrad)" opacity="0.9"/>
  <text x="200" y="335" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">
    SATISFACTION GUARANTEED
  </text>

  <!-- Phone number -->
  <text x="200" y="362" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#2563EB" text-anchor="middle" letter-spacing="1">
    951-934-3250
  </text>
</svg>